name: "CLA Assistant"

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize, edited]

permissions:
  actions: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    if: |
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        (
          contains(github.event.comment.body, 'recheck') ||
          contains(github.event.comment.body, 'I have read the CLA and agree to its terms')
        )
      ) ||
      (
        github.event_name == 'pull_request_target' &&
        github.event.action == 'edited' &&
        contains(github.event.pull_request.body, '- [x] I have read and signed the CLA')
      ) ||
      (
        github.event_name == 'pull_request_target' &&
        github.event.action != 'edited'
      )
    steps:
      - name: "CLA Assistant"
        if: always()
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PAT_TOKEN }}
        with:
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/roshankumar0036singh/auth-server/blob/main/CLA.md'
          branch: 'cla-signatures'
          allowlist: 'roshankumar0036singh,bot*'
